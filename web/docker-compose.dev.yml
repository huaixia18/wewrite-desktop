# Docker 开发环境 — 生产构建模式
# 先构建，再启动（避免 Next.js 16 Turbopack 开发模式路由 Bug）
# 使用方式：docker compose -f docker-compose.dev.yml up

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wewrite
      POSTGRES_PASSWORD: wewrite_dev
      POSTGRES_DB: wewrite
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewrite -d wewrite"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── WeWrite Web (构建 + 生产启动) ────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: "postgresql://wewrite:wewrite_dev@db:5432/wewrite"
      AUTH_SECRET: "wewrite-dev-secret-2026"
      AUTH_TRUST_HOST: "true"
      AI_GATEWAY_API_KEY: "${AI_GATEWAY_API_KEY:-}"
      AI_GATEWAY_BASE_URL: "${AI_GATEWAY_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-7-20250514}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
      IMAGE_GEN_API_KEY: "${IMAGE_GEN_API_KEY:-}"
      IMAGE_GEN_BASE_URL: "${IMAGE_GEN_BASE_URL:-}"
      WECHAT_APP_ID: "${WECHAT_APP_ID:-}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET:-}"
      WECHAT_MP_APPID: "${WECHAT_MP_APPID:-}"
      WECHAT_MP_APPSECRET: "${WECHAT_MP_APPSECRET:-}"
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
      STRIPE_PRO_MONTHLY_PRICE_ID: "${STRIPE_PRO_MONTHLY_PRICE_ID:-}"
      STRIPE_PRO_YEARLY_PRICE_ID: "${STRIPE_PRO_YEARLY_PRICE_ID:-}"
      NEXT_PUBLIC_BASE_URL: "${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
