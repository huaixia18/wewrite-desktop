version: "3.9"

# Docker 开发环境 — 支持热更新
# 使用方式：docker compose -f docker-compose.dev.yml up

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wewrite
      POSTGRES_PASSWORD: wewrite_dev
      POSTGRES_DB: wewrite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewrite -d wewrite"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── WeWrite Web (Dev — 热更新) ──────────────────────────────────────
  web:
    image: node:20-alpine
    restart: unless-stopped
    command: sh -c "npm install && npx prisma migrate dev --name init && npm run dev"
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://wewrite:wewrite_dev@db:5432/wewrite"
      AUTH_SECRET: "wewrite-dev-secret"
      AUTH_TRUST_HOST: "true"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      WECHAT_APP_ID: "${WECHAT_APP_ID:-}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET:-}"
      WECHAT_MP_APPID: "${WECHAT_MP_APPID:-}"
      WECHAT_MP_APPSECRET: "${WECHAT_MP_APPSECRET:-}"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
