version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wewrite
      POSTGRES_PASSWORD: wewrite_dev
      POSTGRES_DB: wewrite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wewrite -d wewrite"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── WeWrite Web ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database
      DATABASE_URL: "postgresql://wewrite:wewrite_dev@db:5432/wewrite"
      # NextAuth
      AUTH_SECRET: "wewrite-dev-secret-change-in-production"
      AUTH_TRUST_HOST: "true"
      # AI (fill in your own keys for production)
      AI_GATEWAY_API_KEY: "${AI_GATEWAY_API_KEY:-}"
      AI_GATEWAY_BASE_URL: "${AI_GATEWAY_BASE_URL:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-sk-ant-placeholder}"
      ANTHROPIC_BASE_URL: "${ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
      ANTHROPIC_MODEL: "${ANTHROPIC_MODEL:-claude-sonnet-4-7-20250514}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o}"
      IMAGE_GEN_API_KEY: "${IMAGE_GEN_API_KEY:-}"
      IMAGE_GEN_BASE_URL: "${IMAGE_GEN_BASE_URL:-}"
      # WeChat OAuth (optional)
      WECHAT_APP_ID: "${WECHAT_APP_ID:-}"
      WECHAT_APP_SECRET: "${WECHAT_APP_SECRET:-}"
      # WeChat Official Account (optional)
      WECHAT_MP_APPID: "${WECHAT_MP_APPID:-}"
      WECHAT_MP_APPSECRET: "${WECHAT_MP_APPSECRET:-}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
